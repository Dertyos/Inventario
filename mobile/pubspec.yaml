name: inventario_mobile
description: "Sistema de inventario multi-tenant para Android e iOS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Voice
  speech_to_text: ^7.0.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Forms & Validation
  reactive_forms: ^17.0.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.5.0
  freezed_annotation: ^2.4.6
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
