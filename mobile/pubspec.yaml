name: inventario_mobile
description: "Sistema de inventario multi-tenant para Android e iOS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # Voice
  speech_to_text: ^7.0.0

  # Scanner
  mobile_scanner: ^7.0.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^7.0.0

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^10.0.0

  # Forms & Validation
  reactive_forms: ^18.2.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.2.3
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
