name: Mobile CI (Flutter)

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

env:
  FLUTTER_VERSION: '3.29.x'
  WORKING_DIR: ./mobile

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run analyzer
        run: flutter analyze --fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Enforce 100% coverage
        run: |
          if [ -f coverage/lcov.info ]; then
            TOTAL_LINES=$(grep -c "^DA:" coverage/lcov.info || echo "0")
            COVERED_LINES=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$" || echo "0")
            if [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$(awk "BEGIN {printf \"%.2f\", ($COVERED_LINES/$TOTAL_LINES)*100}")
              echo "Line coverage: ${COVERAGE}%"
              if [ "$(echo "$COVERAGE < 100" | bc -l)" -eq 1 ]; then
                echo "FAIL: Line coverage is ${COVERAGE}%, required 100%"
                exit 1
              fi
              echo "All coverage metrics at 100%"
            fi
          fi

      - name: Enforce 100% coverage (branch level)
        run: |
          if [ -f coverage/lcov.info ]; then
            TOTAL_BRANCHES=$(grep -c "^BRDA:" coverage/lcov.info || echo "0")
            if [ "$TOTAL_BRANCHES" -gt 0 ]; then
              MISSED_BRANCHES=$(grep "^BRDA:" coverage/lcov.info | grep -c ",-$\|,0$" || echo "0")
              COVERED_BRANCHES=$((TOTAL_BRANCHES - MISSED_BRANCHES))
              COVERAGE=$(awk "BEGIN {printf \"%.2f\", ($COVERED_BRANCHES/$TOTAL_BRANCHES)*100}")
              echo "Branch coverage: ${COVERAGE}%"
              if [ "$(echo "$COVERAGE < 100" | bc -l)" -eq 1 ]; then
                echo "FAIL: Branch coverage is ${COVERAGE}%, required 100%"
                exit 1
              fi
              echo "Branch coverage at 100%"
            fi
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 7

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug
