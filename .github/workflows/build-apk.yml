name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Backend API URL (e.g. https://inventario-api.onrender.com)'
        required: false
        default: ''

env:
  FLUTTER_VERSION: '3.29.x'
  WORKING_DIR: ./mobile

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          DART_DEFINES=""
          if [ -n "${{ github.event.inputs.api_base_url }}" ]; then
            DART_DEFINES="--dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url }}"
          fi
          flutter build apk --release $DART_DEFINES

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventario-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
